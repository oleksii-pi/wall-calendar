<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Family Calendar</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="calendar" class="calendar" aria-live="polite"></main>

    <button id="talkButton" class="talk-button" type="button" aria-label="Push to talk"></button>

    <nav id="appMenu" class="app-menu" hidden>
      <button id="addEventButton" type="button">Add</button>
      <button id="monthViewButton" type="button">Month view</button>
      <button id="settingsButton" type="button">Settings</button>
    </nav>

    <dialog id="eventDialog">
      <form method="dialog" id="eventForm">
        <h2 id="eventDialogTitle" tabindex="-1">New event</h2>
        <input id="eventId" type="hidden">
        <div class="title-field">
          <label id="speechLabel" for="speechText">Title</label>
          <div class="title-input-row">
            <textarea id="speechText" rows="3" autocomplete="off" required readonly></textarea>
            <button id="titleDictateButton" class="icon-button title-dictate-button" type="button" aria-label="Dictate title" title="Dictate title">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <path d="M12 19v3"></path>
              </svg>
            </button>
          </div>
        </div>
        <label>
          <span id="dateLabel">Date</span>
          <input id="eventDate" type="date" required>
        </label>
        <label class="inline-check">
          <input id="eventAllDay" type="checkbox">
          <span id="allDayLabel">Full day</span>
        </label>
        <div class="compact-grid time-grid">
          <label>
            <span id="timeLabel">Start</span>
            <input id="eventTime" type="time" step="900">
          </label>
          <label>
            <span id="endLabel">End</span>
            <input id="eventEndTime" type="time" step="900">
          </label>
        </div>
        <fieldset id="memberChoices">
          <legend id="membersLegend">People</legend>
        </fieldset>
        <menu>
          <button value="delete" type="button" id="deleteEvent">Delete</button>
          <button value="cancel" type="button" id="cancelEvent">Cancel</button>
          <button value="default" type="submit" id="saveEvent">Add</button>
        </menu>
      </form>
    </dialog>

    <dialog id="settingsDialog">
      <form method="dialog" id="settingsForm">
        <h2 id="settingsTitle" tabindex="-1">Settings</h2>
        <label>
          <span id="languageLabel">Language</span>
          <select id="languageSelect">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="uk">Українська</option>
          </select>
        </label>
        <label>
          <span id="membersInputLabel">Names, separated by comma</span>
          <input id="membersInput" type="text" placeholder="Adult, child">
        </label>
        <div id="memberColorSettings" class="member-color-settings"></div>
        <p class="hint" id="settingsHint">Data stays in this browser.</p>
        <menu>
          <button value="cancel" type="button" id="cancelSettings">Cancel</button>
          <button value="default" type="submit" id="saveSettings">Save</button>
        </menu>
      </form>
    </dialog>

    <dialog id="confirmDialog">
      <form method="dialog" id="confirmForm">
        <h2 id="confirmTitle" tabindex="-1">Delete event?</h2>
        <p class="hint" id="confirmHint">This cannot be undone.</p>
        <menu>
          <button value="cancel" type="button" id="cancelDelete">Cancel</button>
          <button value="delete" type="submit" id="confirmDelete">Delete</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
